services:
  - type: web
    name: assignment-backend
    env: node
    plan: free
    buildCommand: npm install && prisma generate && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        value: file:/data/sqlite.db
      - key: FRONTEND_URL
        # You should update this to your actual Render frontend URL when you deploy the frontend
        value: "https://assignment-nine-cyan.vercel.app/" 
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
