services:
  - type: web
    name: assignment-backend
    env: node
    plan: free
    buildCommand: npm install && prisma generate && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        value: file:./production.db
      - key: FRONTEND_URL
        value: "https://assignment-nine-cyan.vercel.app/"
